version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nupp_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: prj_db_nupp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nupp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d prj_db_nupp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  nupp_network:
    driver: bridge
